services:
  - type: worker
    name: vet-bot
    env: python
    region: frankfurt  # або будь-який регіон
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python bot.py"
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_USER_IDS
        sync: false
      - key: BOT_TIMEZONE
        sync: false
      - key: GOOGLE_SHEETS_SPREADSHEET_ID
        sync: false
      - key: GOOGLE_SHEETS_WORKSHEET_NAME
        sync: false
      - key: GOOGLE_SHEETS_CONSULTATIONS_WORKSHEET_NAME
        sync: false
      - key: GOOGLE_SHEETS_SYSTEM_WORKSHEET_NAME
        sync: false
      - key: GOOGLE_SHEETS_CHATS_WORKSHEET_NAME
        sync: false
      - key: GOOGLE_SHEETS_CHAT_ASSIGNMENTS_WORKSHEET_NAME
        sync: false
      - key: GOOGLE_SHEETS_EVENTS_WORKSHEET_NAME
        sync: false
      - key: GOOGLE_SHEETS_REMINDERS_WORKSHEET_NAME
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: WELCOME_BANNER_URL
        sync: false
      - key: WELCOME_BANNER_FILE_ID
        sync: false
